[build]
builder = "nixpacks"

[build.nixpacks]
providers = ["python", "node"]

[deploy]
startCommand = "gunicorn -w 1 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --timeout 600 --access-logfile - --error-logfile -"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "always"
restartPolicyMaxRetries = 5
